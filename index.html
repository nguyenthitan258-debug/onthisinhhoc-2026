<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiz Thể Sinh 12 – Cuối Kì 1</title>
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #4f46e5;
      --primary-light: #e0e7ff;
      --correct: #16a34a;
      --correct-light: #dcfce7;
      --wrong: #dc2626;
      --wrong-light: #fee2e2;
      --bg: #f1f5f9;
      --card: #ffffff;
      --text: #1e293b;
      --muted: #64748b;
      --border: #e2e8f0;
      --radius: 14px;
      --shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px 16px 48px;
    }

    /* ===== LAYOUT ===== */
    .container {
      width: 100%;
      max-width: 780px;
    }

    /* ===== HEADER ===== */
    .header {
      text-align: center;
      margin-bottom: 28px;
    }
    .header h1 {
      font-size: clamp(1.4rem, 4vw, 1.9rem);
      font-weight: 800;
      color: var(--primary);
      letter-spacing: -0.5px;
    }
    .header p {
      color: var(--muted);
      margin-top: 6px;
      font-size: 0.95rem;
    }

    /* ===== PROGRESS ===== */
    .progress-wrap {
      background: var(--card);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
    }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.88rem;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .progress-label span:first-child { font-weight: 700; color: var(--primary); }
    .progress-bar-bg {
      background: var(--border);
      border-radius: 999px;
      height: 8px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), #818cf8);
      border-radius: 999px;
      transition: width 0.4s ease;
    }

    /* ===== QUESTION CARD ===== */
    .question-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 28px 28px 24px;
      box-shadow: var(--shadow);
      margin-bottom: 20px;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

    .question-num {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }
    .question-text {
      font-size: 1.05rem;
      font-weight: 600;
      line-height: 1.65;
      white-space: pre-wrap;
    }

    /* ===== OPTIONS ===== */
    .options { display: flex; flex-direction: column; gap: 12px; margin-top: 22px; }

    .option-btn {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      padding: 14px 18px;
      border: 2px solid var(--border);
      border-radius: 12px;
      background: #fff;
      cursor: pointer;
      text-align: left;
      font-size: 0.97rem;
      line-height: 1.5;
      transition: border-color 0.2s, background 0.2s, transform 0.1s;
      user-select: none;
    }
    .option-btn:hover:not(.locked) {
      border-color: var(--primary);
      background: var(--primary-light);
      transform: translateX(3px);
    }
    .option-letter {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      min-width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--bg);
      font-weight: 700;
      font-size: 0.85rem;
      color: var(--muted);
      transition: background 0.2s, color 0.2s;
    }
    .option-text { flex: 1; padding-top: 3px; }

    /* States */
    .option-btn.correct {
      border-color: var(--correct);
      background: var(--correct-light);
    }
    .option-btn.correct .option-letter {
      background: var(--correct);
      color: #fff;
    }
    .option-btn.wrong {
      border-color: var(--wrong);
      background: var(--wrong-light);
    }
    .option-btn.wrong .option-letter {
      background: var(--wrong);
      color: #fff;
    }
    .option-btn.locked { cursor: default; }

    .option-icon {
      margin-left: auto;
      font-size: 1.1rem;
      padding-top: 3px;
      min-width: 20px;
      text-align: right;
    }

    /* ===== EXPLANATION ===== */
    .explanation-box {
      display: none;
      margin-top: 18px;
      padding: 14px 18px;
      background: #f0fdf4;
      border-left: 4px solid var(--correct);
      border-radius: 0 10px 10px 0;
      font-size: 0.93rem;
      line-height: 1.6;
      color: #166534;
      animation: fadeIn 0.25s ease;
    }
    .explanation-box.show { display: block; }
    .explanation-box.wrong-exp {
      background: #fff7ed;
      border-color: #f97316;
      color: #7c2d12;
    }
    .explanation-box strong { display: block; margin-bottom: 4px; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px; }

    /* ===== NEXT BUTTON ===== */
    .btn-next {
      display: none;
      width: 100%;
      padding: 14px;
      margin-top: 8px;
      background: linear-gradient(135deg, var(--primary), #818cf8);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.3px;
    }
    .btn-next:hover { opacity: 0.92; transform: translateY(-1px); }
    .btn-next.show { display: block; }

    /* ===== RESULT SCREEN ===== */
    .result-screen {
      display: none;
      background: var(--card);
      border-radius: var(--radius);
      padding: 40px 32px;
      box-shadow: var(--shadow);
      text-align: center;
      animation: fadeIn 0.4s ease;
    }
    .result-screen.show { display: block; }

    .result-emoji { font-size: 4rem; margin-bottom: 12px; }
    .result-title { font-size: 1.6rem; font-weight: 800; color: var(--primary); margin-bottom: 8px; }
    .result-score {
      font-size: 3.2rem;
      font-weight: 900;
      color: var(--text);
      margin: 16px 0 6px;
    }
    .result-score span { color: var(--primary); }
    .result-percent {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 20px;
    }
    .result-comment {
      font-size: 1.1rem;
      color: var(--text);
      background: var(--primary-light);
      border-radius: 10px;
      padding: 14px 20px;
      margin-bottom: 28px;
      line-height: 1.6;
    }
    .btn-restart {
      padding: 14px 40px;
      background: linear-gradient(135deg, var(--primary), #818cf8);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn-restart:hover { opacity: 0.9; transform: translateY(-2px); }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 480px) {
      .question-card { padding: 20px 18px; }
      .question-text { font-size: 0.97rem; }
      .option-btn { padding: 12px 14px; font-size: 0.92rem; }
    }
  </style>
</head>
<body>
<div class="container">

  <!-- HEADER -->
  <div class="header">
    <h1>🧬 Quiz Thể Sinh 12</h1>
    <p>Câu hỏi trắc nghiệm Sinh học 12</p>
  </div>

  <!-- PROGRESS BAR -->
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-label">
      <span id="progressText">Câu 1 / 45</span>
      <span id="scoreText">Đúng: 0</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <!-- QUESTION CARD -->
  <div class="question-card" id="questionCard">
    <div class="question-num" id="questionNum">Câu 1</div>
    <div class="question-text" id="questionText"></div>
    <div class="options" id="optionsContainer"></div>
    <div class="explanation-box" id="explanationBox">
      <strong>💡 Giải thích</strong>
      <span id="explanationText"></span>
    </div>
    <button class="btn-next" id="btnNext" onclick="nextQuestion()">Câu tiếp theo →</button>
  </div>

  <!-- RESULT SCREEN -->
  <div class="result-screen" id="resultScreen">
    <div class="result-emoji" id="resultEmoji">🎉</div>
    <div class="result-title">Hoàn thành bài quiz!</div>
    <div class="result-score"><span id="scoreNum">0</span> / <span id="totalNum">45</span></div>
    <div class="result-percent" id="resultPercent">0%</div>
    <div class="result-comment" id="resultComment"></div>
    <button class="btn-restart" onclick="restartQuiz()">🔄 Làm lại (Câu hỏi xáo trộn)</button>
  </div>

</div>

<script>
// ============================================================
//  DỮ LIỆU CÂU HỎI – 18 câu Đề A + 27 câu Đề B = 45 câu
// ============================================================
const quizData = [

  // ── ĐỀ A – Câu 1 ──
  {
    question: "Loại bằng chứng nào dưới đây KHÔNG được xem là bằng chứng tiến hóa TRỰC TIẾP?",
    options: [
      "Hóa thạch xương khủng long được tìm thấy trong lớp đá trầm tích hàng triệu năm tuổi.",
      "Xác voi ma mút được bảo tồn nguyên vẹn trong lớp băng vĩnh cửu.",
      "Dấu tích thực vật cổ đại còn lưu lại trong các lớp than đá.",
      "Sự tương đồng về trình tự axit amin trong protein giữa người và tinh tinh."
    ],
    correctIndex: 3,
    explanation: "Bằng chứng tiến hóa trực tiếp là di tích, xác, hóa thạch của sinh vật thực sự tồn tại trong quá khứ. Sự tương đồng trình tự axit amin giữa người và tinh tinh là bằng chứng sinh học phân tử (bằng chứng gián tiếp), không phải bằng chứng trực tiếp."
  },

  // ── ĐỀ A – Câu 2 ──
  {
    question: "Một học sinh tóm tắt: \"Darwin đi thực địa thu thập số liệu, sau đó đề xuất giả thuyết, rồi dùng thí nghiệm kiểm chứng.\" Trình tự đó tương ứng với phương án nào sau đây?",
    options: [
      "Hình thành giả thuyết → Kiểm chứng → Quan sát.",
      "Kiểm chứng → Quan sát → Hình thành giả thuyết.",
      "Quan sát → Kiểm chứng → Hình thành giả thuyết.",
      "Quan sát → Hình thành giả thuyết → Kiểm chứng giả thuyết."
    ],
    correctIndex: 3,
    explanation: "Phương pháp khoa học đúng của Darwin là: Quan sát thực tế → Hình thành giả thuyết giải thích → Kiểm chứng giả thuyết. Câu tóm tắt của học sinh mô tả đúng trình tự này, tương ứng với đáp án D."
  },

  // ── ĐỀ A – Câu 3 ──
  {
    question: "Xét các phát biểu dưới đây về vai trò của chọn lọc tự nhiên (CLTN) trong hình thành đặc điểm thích nghi:\n\nI. CLTN trực tiếp tạo ra các alen mới có lợi giúp sinh vật thích nghi tốt hơn.\nII. CLTN sàng lọc và giữ lại cá thể có kiểu hình thích nghi đã có sẵn trong quần thể.\nIII. CLTN loại bỏ những cá thể mang kiểu hình bất lợi ra khỏi quần thể.\nIV. CLTN làm tăng số lượng các cá thể có kiểu hình thích nghi.\n\nSố phát biểu SAI là:",
    options: ["1", "2", "3", "4"],
    correctIndex: 0,
    explanation: "Chỉ có phát biểu I là SAI: CLTN không trực tiếp tạo ra alen mới, đó là vai trò của đột biến. CLTN chỉ sàng lọc các biến dị sẵn có, giữ lại kiểu hình có lợi (II, III, IV đều đúng). Vậy số phát biểu SAI = 1."
  },

  // ── ĐỀ A – Câu 4 ──
  {
    question: "Đặc điểm nào dưới đây phản ánh ĐÚNG bản chất của tiến hóa nhỏ?",
    options: [
      "Sự biến đổi tần số alen và thành phần kiểu gen trong quần thể theo thời gian.",
      "Quá trình hình thành các nhóm phân loại trên loài như chi, họ, bộ, lớp.",
      "Sự thay đổi lớn về cấu trúc hình thái cơ thể sinh vật qua nhiều thế hệ.",
      "Sự thích nghi của sinh vật với môi trường sống mới do điều kiện sống thay đổi."
    ],
    correctIndex: 0,
    explanation: "Tiến hóa nhỏ là quá trình biến đổi tần số alen và thành phần kiểu gen trong quần thể qua thời gian, diễn ra ở cấp độ quần thể. Hình thành nhóm phân loại trên loài là tiến hóa lớn."
  },

  // ── ĐỀ A – Câu 5 ──
  {
    question: "Theo thuyết tiến hóa tổng hợp hiện đại, nhân tố tiến hóa nào CÓ KHẢ NĂNG tạo ra nguồn nguyên liệu sơ cấp (alen mới) cho quá trình tiến hóa?",
    options: [
      "Chọn lọc tự nhiên.",
      "Giao phối không ngẫu nhiên.",
      "Phiêu bạt di truyền.",
      "Đột biến."
    ],
    correctIndex: 3,
    explanation: "Đột biến (gen và nhiễm sắc thể) là nhân tố tiến hóa duy nhất tạo ra alen mới (nguyên liệu sơ cấp). Các nhân tố còn lại chỉ làm thay đổi tần số alen đã có, không tạo ra alen mới."
  },

  // ── ĐỀ A – Câu 6 ──
  {
    question: "Kết luận nào sau đây là ĐÚNG khi phân biệt tiến hóa nhỏ và tiến hóa lớn?",
    options: [
      "Tiến hoá lớn là biến đổi tần số alen trong quần thể; tiến hoá nhỏ hình thành nhóm phân loại trên loài.",
      "Tiến hoá nhỏ và tiến hoá lớn là hai quá trình hoàn toàn độc lập, không có liên hệ với nhau.",
      "Tiến hoá nhỏ là sự biến đổi tần số alen và kiểu gen trong quần thể; tiến hoá lớn là quá trình hình thành các nhóm phân loại trên loài.",
      "Tiến hoá lớn chỉ xảy ra trong quần thể nhỏ; tiến hoá nhỏ xảy ra ở phạm vi cả loài."
    ],
    correctIndex: 2,
    explanation: "Đáp án C phân biệt chính xác: tiến hóa nhỏ xảy ra ở cấp quần thể (biến đổi tần số alen/kiểu gen), còn tiến hóa lớn hình thành các đơn vị phân loại trên loài (chi, họ, bộ…). Hai quá trình có liên hệ: tích lũy tiến hóa nhỏ dẫn đến tiến hóa lớn."
  },

  // ── ĐỀ A – Câu 7 ──
  {
    question: "Vì sao vi khuẩn, nấm, thực vật và động vật đều được biểu diễn trên cùng một cây phát sinh chủng loại (cây sự sống)?",
    options: [
      "Vì tất cả chúng đều sống trong cùng một môi trường địa lý.",
      "Vì tất cả chúng có cùng trình tự ADN giống hệt nhau.",
      "Vì tất cả chúng đều có cấu trúc tế bào hoàn toàn giống nhau.",
      "Vì tất cả chúng đều có chung nguồn gốc tổ tiên trong lịch sử tiến hóa."
    ],
    correctIndex: 3,
    explanation: "Cây phát sinh chủng loại biểu diễn mối quan hệ tiến hóa giữa các sinh vật. Tất cả sinh vật đều được đặt trên cùng một cây vì có chung nguồn gốc từ tổ tiên chung (tế bào nguyên thủy đầu tiên), thể hiện thuyết tiến hóa từ nguồn gốc chung."
  },

  // ── ĐỀ A – Câu 8 ──
  {
    question: "Phát biểu nào sau đây KHÔNG đúng về môi trường sống của sinh vật?",
    options: [
      "Môi trường sống bao gồm tất cả nhân tố vô sinh và hữu sinh ảnh hưởng đến đời sống sinh vật.",
      "Môi trường sống có các nhân tố vô sinh khi tác động vào quần thể sẽ không phụ thuộc vào mật độ",
      "Môi trường sống chỉ gồm các nhân tố hữu sinh xung quanh sinh vật, không bao gồm nhân tố vô sinh.",
      "Môi trường sống có thể tác động trực tiếp hoặc gián tiếp đến sinh trưởng và phát triển của sinh vật."
    ],
    correctIndex: 2,
    explanation: "Phát biểu C sai vì môi trường sống bao gồm CẢ nhân tố vô sinh (ánh sáng, nhiệt độ, nước, đất…) lẫn nhân tố hữu sinh (sinh vật khác). Không thể loại bỏ nhân tố vô sinh khỏi định nghĩa môi trường sống."
  },

  // ── ĐỀ A – Câu 9 ──
  {
    question: "Phát biểu nào sau đây ĐÚNG về nhịp sinh học?",
    options: [
      "Nhịp sinh học là những thay đổi đột ngột trong hoạt động sống của sinh vật khi gặp điều kiện bất lợi.",
      "Nhịp sinh học là những biến đổi bất thường của sinh vật khi môi trường sống thay đổi ngẫu nhiên.",
      "Nhịp sinh học là những phản ứng nhịp nhàng, có tính chu kì của sinh vật tương ứng với biến đổi có chu kì của môi trường.",
      "Nhịp sinh học là sự thay đổi hình thái cơ thể sinh vật theo từng giai đoạn phát triển cá thể."
    ],
    correctIndex: 2,
    explanation: "Nhịp sinh học là những biến đổi có chu kỳ, lặp lại đều đặn trong hoạt động sống của sinh vật, tương ứng với nhịp biến đổi có chu kỳ của môi trường (ngày/đêm, mùa…). Đây là cơ chế thích nghi của sinh vật với môi trường."
  },

  // ── ĐỀ A – Câu 10 ──
  {
    question: "Đặc điểm thích nghi nào thường gặp ở động vật sống trong các hang động tối hoàn toàn?",
    options: [
      "Cơ quan thị giác tiêu giảm hoặc mất hoàn toàn chức năng.",
      "Cơ quan thị giác phát triển mạnh để tận dụng lượng ánh sáng yếu.",
      "Lớp da dày hơn để bảo vệ cơ thể khỏi va đập trong hang tối.",
      "Cơ quan xúc giác và khứu giác đều tiêu giảm để tiết kiệm năng lượng."
    ],
    correctIndex: 0,
    explanation: "Trong hang tối hoàn toàn, mắt không có chức năng nên qua nhiều thế hệ CLTN loại bỏ năng lượng duy trì mắt không cần thiết, dẫn đến mắt tiêu giảm. Ngược lại, xúc giác và khứu giác thường phát triển hơn để bù đắp."
  },

  // ── ĐỀ A – Câu 11 ──
  {
    question: "Tập hợp nào dưới đây được xem là một quần thể sinh vật?",

// ============================================================
//  BIẾN TRẠNG THÁI
// ============================================================
let shuffled = [];      // mảng câu hỏi đã xáo trộn
let currentIndex = 0;  // chỉ số câu hiện tại
let score = 0;         // số câu đúng
let answered = false;  // đã chọn đáp án chưa?

// ============================================================
//  KHỞI ĐỘNG QUIZ
// ============================================================
function startQuiz() {
  shuffled = shuffle([...quizData]);
  currentIndex = 0;
  score = 0;
  answered = false;
  document.getElementById('resultScreen').classList.remove('show');
  document.getElementById('questionCard').style.display = '';
  document.getElementById('progressWrap').style.display = '';
  renderQuestion();
}

// Fisher-Yates shuffle
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

// ============================================================
//  HIỂN THỊ CÂU HỎI
// ============================================================
function renderQuestion() {
  answered = false;
  const q = shuffled[currentIndex];
  const total = shuffled.length;

  // Progress
  document.getElementById('progressText').textContent = `Câu ${currentIndex + 1} / ${total}`;
  document.getElementById('scoreText').textContent = `Đúng: ${score}`;
  document.getElementById('progressFill').style.width = `${(currentIndex / total) * 100}%`;

  // Question
  document.getElementById('questionNum').textContent = `Câu ${currentIndex + 1}`;
  document.getElementById('questionText').textContent = q.question;

  // Options
  const letters = ['A', 'B', 'C', 'D'];
  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `
      <span class="option-letter">${letters[i]}</span>
      <span class="option-text">${opt}</span>
      <span class="option-icon"></span>
    `;
    btn.onclick = () => selectAnswer(i);
    container.appendChild(btn);
  });

  // Explanation & Next
  const expBox = document.getElementById('explanationBox');
  expBox.className = 'explanation-box';
  expBox.style.display = 'none';
  document.getElementById('btnNext').classList.remove('show');

  // Re-trigger animation
  const card = document.getElementById('questionCard');
  card.style.animation = 'none';
  void card.offsetWidth;
  card.style.animation = '';
}

// ============================================================
//  XỬ LÝ CHỌN ĐÁP ÁN
// ============================================================
function selectAnswer(selectedIndex) {
  if (answered) return;
  answered = true;

  const q = shuffled[currentIndex];
  const buttons = document.querySelectorAll('.option-btn');

  buttons.forEach((btn, i) => {
    btn.classList.add('locked');
    if (i === q.correctIndex) {
      btn.classList.add('correct');
      btn.querySelector('.option-icon').textContent = '✓';
    }
    if (i === selectedIndex && selectedIndex !== q.correctIndex) {
      btn.classList.add('wrong');
      btn.querySelector('.option-icon').textContent = '✗';
    }
  });

  // Điểm
  const isCorrect = selectedIndex === q.correctIndex;
  if (isCorrect) score++;

  // Explanation
  const expBox = document.getElementById('explanationBox');
  expBox.style.display = 'block';
  expBox.className = 'explanation-box show' + (isCorrect ? '' : ' wrong-exp');
  document.getElementById('explanationText').textContent = q.explanation;

  // Next button
  document.getElementById('btnNext').classList.add('show');
  document.getElementById('scoreText').textContent = `Đúng: ${score}`;
}

// ============================================================
//  CÂU TIẾP THEO
// ============================================================
function nextQuestion() {
  currentIndex++;
  if (currentIndex >= shuffled.length) {
    showResult();
  } else {
    renderQuestion();
  }
}

// ============================================================
//  MÀN HÌNH KẾT QUẢ
// ============================================================
function showResult() {
  document.getElementById('questionCard').style.display = 'none';
  document.getElementById('progressWrap').style.display = 'none';

  const total = shuffled.length;
  const pct = Math.round((score / total) * 100);

  document.getElementById('scoreNum').textContent = score;
  document.getElementById('totalNum').textContent = total;
  document.getElementById('resultPercent').textContent = pct + '%';

  let emoji, comment;
  if (pct >= 90) {
    emoji = '🏆';
    comment = 'Xuất sắc! Bạn nắm vững toàn bộ kiến thức. Tiếp tục phát huy nhé!';
  } else if (pct >= 75) {
    emoji = '🌟';
    comment = 'Tốt lắm! Bạn hiểu bài khá tốt. Xem lại những câu sai để hoàn thiện thêm.';
  } else if (pct >= 55) {
    emoji = '📚';
    comment = 'Khá! Bạn cần ôn lại một số phần. Hãy đọc kỹ lý thuyết và làm lại nhé!';
  } else {
    emoji = '💪';
    comment = 'Cần cố gắng thêm! Ôn lại lý thuyết Tiến hóa và Sinh thái học, rồi thử lại!';
  }

  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultComment').textContent = comment;
  document.getElementById('resultScreen').classList.add('show');
}

// ============================================================
//  LÀM LẠI
// ============================================================
function restartQuiz() {
  startQuiz();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ============================================================
//  KHỞI CHẠY
// ============================================================
startQuiz();
</script>
